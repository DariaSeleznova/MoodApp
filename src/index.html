<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodApp</title>
    <script src="./js/main.bundle.js" defer></script>
</head>

<body>
    <header class="container">
        <div class="logo"><img class="logo" alt="MoodApp logo"></div>
        <nav class="mood-nav">
            <button class="mood-btn" data-mood="happy"></button>
            <button class="mood-btn" data-mood="relaxed"></button>
            <button class="mood-btn" data-mood="excited"></button>
            <button class="mood-btn" data-mood="spirited"></button>
            <button class="mood-btn" data-mood="tired"></button>
            <button class="mood-btn" data-mood="sad"></button>
        </nav>
        <div class="client-area">
            <button class="login-btn">Login</button>
            <button class="signup-btn">Sign Up</button>
            <select name="" id="lang-switch">
                <option value="en">English</option>
                <option value="uk">Українська</option>
            </select>
            <a href="favorites.html" class="favorites-link">❤️ Favorites</a>
        </div>
    </header>
    <div class="title_app container">
        <h1>Выбери свое настроение</h1>
    </div>
    <div class="app container">
        <section class="movies">
            <h2>Movies</h2>
            <div id="movies-list"></div>
            <div class="controls">
                <button id="prev-movie">←</button>
                <button id="next-movie">→</button>
                <div class="movies-loader hidden"></div>
                <a class="more-link" data-type="movies" href="#">More...</a>
            </div>
        </section>
        <section class="series">
            <h2>Series</h2>
            <div id="series-list"></div>
            <div class="controls">
                <button id="prev-series">←</button>
                <button id="next-series">→</button>
                <div class="series-loader hidden"></div>
                <a class="more-link" data-type="series" href="#">More...</a>
            </div>

        </section>
        <section class="books">
            <h2>Books</h2>
            <div id="books-list"></div>
            <div class="books-loader hidden"></div>
            <a class="more-link" data-type="books" href="#">More...</a>
        </section>
        <section class="music">
            <h2>Music</h2>
            <div id="music-list"></div>
            <div class="music-loader hidden"></div>
            <a class="more-link" data-type="music" href="#">More...</a>
        </section>
    </div>

</body>

</html>
